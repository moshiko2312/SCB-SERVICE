<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#07182e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SCB SERVICE">
<title>SCB SERVICE</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#16406e,#07182e 50%,#031021);color:#f5f9ff}.app{max-width:980px;margin:auto;padding:18px 14px 96px}.top{position:sticky;top:8px;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:15px;border-radius:26px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);box-shadow:0 18px 45px rgba(0,0,0,.25);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#0b4c82,#1aa3ff);display:grid;place-items:center;font-weight:900;font-size:24px}.sid{direction:ltr;font-size:12px;color:#c8ecff;border:1px solid #2d76ae;background:#0b2a4e;padding:8px 10px;border-radius:999px}h1{font-size:22px;margin:0}.sub{margin-top:4px;color:#a9bdd5;font-size:13px}.card{margin-top:14px;padding:16px;border-radius:24px;background:rgba(13,36,66,.92);border:1px solid rgba(255,255,255,.1)}h2{font-size:17px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid.two{grid-template-columns:repeat(2,1fr)}label span,.lbl{display:block;color:#d8e8fb;font-size:13px;margin:0 4px 7px}.input,.select,.textarea{width:100%;border:1px solid rgba(122,181,231,.32);background:#091d36;color:#fff;border-radius:16px;padding:13px 14px;font-size:16px;outline:none;min-height:50px}.textarea{min-height:112px;resize:vertical;line-height:1.55}.pick{cursor:pointer;display:flex;align-items:center;justify-content:space-between}.pick:after{content:'›';transform:rotate(180deg);color:#78caff;font-size:24px}.sigBox{height:170px;background:#fff;border-radius:18px;border:2px dashed #70b7ee;overflow:hidden;position:relative;touch-action:none}.sigBox canvas{width:100%;height:100%;display:block}.hint{position:absolute;inset:auto 0 10px;text-align:center;color:#6b7f99;font-size:13px;pointer-events:none}.actions{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:10px;position:fixed;z-index:10;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(5,17,34,.88);border-top:1px solid rgba(255,255,255,.12)}.btn{border:0;border-radius:17px;padding:14px 16px;color:#fff;font-weight:800;font-size:15px;background:#193b63}.primary{background:linear-gradient(135deg,#1aa3ff,#0b75d1)}.good{background:linear-gradient(135deg,#13b981,#078a61)}.small{font-size:12px;color:#a9bdd5;margin-top:8px}.toast{position:fixed;top:16px;left:16px;right:16px;z-index:50;background:#0a2342;border:1px solid #2d6aa2;padding:12px 14px;border-radius:16px;display:none;text-align:center}.modal{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.55);display:none;align-items:end;justify-content:center;padding:16px}.modal.on{display:flex}.sheet{width:min(520px,100%);max-height:88vh;overflow:auto;background:#f8fbff;color:#102033;border-radius:24px;padding:16px}.sheetHead,.calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.iconBtn{border:0;background:#e7f3ff;border-radius:12px;padding:10px 14px;font-weight:900}.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}.week div{font-weight:800;color:#5b6d82;font-size:13px}.day{border:1px solid #d8e5f2;background:#fff;border-radius:12px;min-height:42px;font-weight:700}.day.sel{background:#1aa3ff;color:white}.wheels{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}.wheel{height:210px;overflow:auto;background:#fff;border:1px solid #d8e5f2;border-radius:18px}.wheel button{display:block;width:100%;height:42px;border:0;background:transparent;font-size:22px;font-weight:800;color:#65758a}.wheel button.sel{color:#102033;background:#eaf4ff}.colon{font-size:32px;font-weight:900;color:#65758a}.sigFull{position:fixed;inset:0;background:#061426;z-index:40;display:none}.sigFull.on{display:block}.sigStage{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px}.sigHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.sigCanvasWrap{flex:1;background:#fff;border:2px solid #71c8ff;border-radius:20px;overflow:hidden;touch-action:none}.sigCanvasWrap canvas{width:100%;height:100%;display:block}.sigBtns{display:flex;gap:8px}@media(orientation:portrait){.sigStage.force{left:50%;top:50%;width:100vh;height:100vw;transform:translate(-50%,-50%) rotate(90deg)}}@media(max-width:720px){.grid,.grid.two{grid-template-columns:1fr}.logo{width:58px;height:58px}.sid{display:none}.actions{grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}}
@media print{body{background:#fff;color:#111}.app,.actions,.modal,.sigFull,.toast{display:none!important}.printOnly{display:block!important}.p{width:194mm;height:281mm;margin:0 auto;border:1px solid #c9d7e8;direction:rtl;font-family:Arial,sans-serif}.ph{height:34mm;background:#07182e;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 12mm}.plogo{width:31mm;height:23mm;border-radius:5mm;background:#1aa3ff;display:grid;place-items:center;font-size:24pt;font-weight:900}.pt{font-size:20pt;font-weight:900}.pbar{height:9mm;background:#0b75d1;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 10mm;font-size:9pt;direction:ltr}.pc{padding:5mm 7mm}.ps{background:#eaf4ff;border:1px solid #bad6ef;color:#063d73;font-weight:900;padding:1.6mm 3mm;margin:3mm 0 2mm;font-size:10.5pt}.pr{display:grid;grid-template-columns:repeat(3,1fr);gap:2mm;margin-bottom:2mm}.pr.two{grid-template-columns:1.2fr 1fr}.pb{border:1px solid #cbd8e6;min-height:16mm;padding:2mm 3mm}.pl{color:#38516f;font-weight:700;font-size:8pt}.pv{font-size:10.5pt;font-weight:700;margin-top:2mm;white-space:pre-wrap}.tx{border:1px solid #cbd8e6;min-height:37mm;padding:3mm;font-size:10pt;line-height:1.45;white-space:pre-wrap}.tx.sm{min-height:23mm}.pa{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:2mm}.psig{border:1px solid #cbd8e6;height:30mm;padding:2mm}.psig img{max-width:75mm;max-height:20mm}.pf{text-align:center;color:#6b7f99;font-size:8pt;margin-top:3mm}@page{size:A4;margin:8mm}}
.printOnly{display:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div><div id="printRoot" class="printOnly"></div>
<div class="app"><header class="top"><div class="brand"><div class="logo">SCB</div><div><h1>טופס ביצוע עבודה</h1><div class="sub">אפליקציית שירות לטכנאי שטח</div></div></div><div class="sid" id="sid"></div></header>
<section class="card"><h2>פרטי לקוח</h2><div class="grid"><label><span>שם לקוח</span><input id="customerName" class="input"></label><label><span>טלפון</span><input id="phone" class="input" inputmode="tel"></label><label><span>איש קשר</span><input id="contactName" class="input"></label><label><span>כתובת</span><input id="address" class="input"></label><label><span>אימייל</span><input id="email" class="input" inputmode="email"></label><label><span>טכנאי</span><input id="technician" class="input"></label></div></section>
<section class="card"><h2>פרטי עבודה</h2><div class="grid"><label><span>סוג עבודה</span><select id="workType" class="select"><option>התקנה</option><option>תיקון</option><option>בדיקה</option><option>תחזוקה</option><option>הדרכה</option><option>אחר</option></select></label><label><span>סטטוס</span><select id="status" class="select"><option>בוצע</option><option>בוצע חלקית</option><option>נדרש המשך טיפול</option><option>לא בוצע</option></select></label><label><span>תאריך</span><button id="workDate" type="button" class="input pick"></button></label><label><span>שעת התחלה</span><button id="startTime" type="button" class="input pick"></button></label><label><span>שעת סיום</span><button id="endTime" type="button" class="input pick"></button></label></div></section>
<section class="card"><h2>מה בוצע</h2><label><span>פירוט העבודה שבוצעה</span><textarea id="workDetails" class="textarea"></textarea></label><label style="margin-top:12px;display:block"><span>הערות נוספות</span><textarea id="notes" class="textarea" style="min-height:76px"></textarea></label></section>
<section class="card"><h2>אישור לקוח</h2><div class="grid two"><label><span>שם מאשר</span><input id="approverName" class="input"></label><label><span>תפקיד</span><input id="approverRole" class="input"></label></div><div style="margin-top:12px"><div class="lbl">חתימת לקוח</div><div class="sigBox" id="sigBox"><canvas id="sig"></canvas><div class="hint">לחץ/י כאן לחתימה במסך מלא לרוחב</div></div><div class="small">במובייל החתימה נפתחת לרוחב גם אם סיבוב המסך נעול.</div></div></section></div>
<div class="actions"><button class="btn primary" id="pdfBtn">ייצא / שמור PDF</button><button class="btn good" id="shareBtn">שלח בוואטסאפ</button><button class="btn" id="newBtn">טופס חדש</button></div>
<div class="modal" id="dateModal"><div class="sheet"><div class="sheetHead"><h3>בחירת תאריך</h3><button class="btn" id="dateClose">סגור</button></div><div class="calHead"><button class="iconBtn" id="prevM">‹</button><strong id="monthTitle"></strong><button class="iconBtn" id="nextM">›</button></div><div class="week"><div>א</div><div>ב</div><div>ג</div><div>ד</div><div>ה</div><div>ו</div><div>ש</div></div><div class="days" id="days"></div></div></div>
<div class="modal" id="timeModal"><div class="sheet"><div class="sheetHead"><h3 id="timeTitle">בחירת שעה</h3><button class="btn good" id="timeOk">אישור</button></div><div class="wheels"><div class="wheel" id="hours"></div><div class="colon">:</div><div class="wheel" id="mins"></div></div></div></div>
<div class="sigFull" id="sigFull"><div class="sigStage force"><div class="sigHead"><strong>חתימת לקוח</strong><div class="sigBtns"><button class="btn" id="clearSigBtn">נקה</button><button class="btn good" id="sigOkBtn">אישור</button></div></div><div class="sigCanvasWrap"><canvas id="sigWide"></canvas></div></div></div>
<script>
const $=id=>document.getElementById(id),fields=['customerName','phone','contactName','address','email','technician','workType','status','workDetails','notes','approverName','approverRole'];let serviceId='',selectedDate=new Date(),activeTime='startTime',hVal=8,mVal=0;const pad=n=>String(n).padStart(2,'0'),fmtDate=d=>`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`,fmtTime=(h,m)=>`${pad(h)}:${pad(m)}`;function makeId(){const d=new Date();return`BCS-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}-${Math.floor(1000+Math.random()*9000)}`}function msg(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2500)}function val(id){let el=$(id);return (el.value!==undefined?el.value:el.textContent).trim()||''}function initNew(){serviceId=makeId();$('sid').textContent=serviceId;selectedDate=new Date();$('workDate').textContent=fmtDate(selectedDate);let d=new Date();$('startTime').textContent=fmtTime(d.getHours(),d.getMinutes());$('endTime').textContent='בחר שעה'}let c=$('sig'),ctx=c.getContext('2d'),cw=$('sigWide'),wctx=cw.getContext('2d'),drawing=false,last=null;function fit(canvas,context){const r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1,img=canvas.width?canvas.toDataURL('image/png'):null;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));context.setTransform(d,0,0,d,0,0);context.lineWidth=3;context.lineCap='round';context.strokeStyle='#111827';if(img){let im=new Image();im.onload=()=>context.drawImage(im,0,0,r.width,r.height);im.src=img}}function p(e,canvas){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function bind(canvas,context){canvas.addEventListener('pointerdown',e=>{drawing=true;last=p(e,canvas);canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const q=p(e,canvas);context.beginPath();context.moveTo(last.x,last.y);context.lineTo(q.x,q.y);context.stroke();last=q;save()},{passive:false});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{drawing=false;last=null;save()}))}bind(c,ctx);bind(cw,wctx);function save(){const o={serviceId,date:$('workDate').textContent,start:$('startTime').textContent,end:$('endTime').textContent,sig:c.toDataURL('image/png')};fields.forEach(id=>o[id]=val(id));localStorage.setItem('scb.service.draft',JSON.stringify(o))}function load(){try{const o=JSON.parse(localStorage.getItem('scb.service.draft')||'{}');if(!o.serviceId)return;serviceId=o.serviceId;$('sid').textContent=serviceId;$('workDate').textContent=o.date||$('workDate').textContent;$('startTime').textContent=o.start||$('startTime').textContent;$('endTime').textContent=o.end||$('endTime').textContent;fields.forEach(id=>{if(o[id]!=null)$(id).value=o[id]});if(o.sig){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);im.src=o.sig}}catch(e){}}$('sigBox').onclick=()=>{document.body.style.overflow='hidden';$('sigFull').classList.add('on');setTimeout(()=>{fit(cw,wctx);wctx.clearRect(0,0,cw.width,cw.height);let im=new Image();im.onload=()=>wctx.drawImage(im,0,0,cw.getBoundingClientRect().width,cw.getBoundingClientRect().height);im.src=c.toDataURL('image/png')},80)};$('sigOkBtn').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);let im=new Image();im.onload=()=>{ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);save()};im.src=cw.toDataURL('image/png');$('sigFull').classList.remove('on');document.body.style.overflow=''};$('clearSigBtn').onclick=()=>{wctx.clearRect(0,0,cw.width,cw.height);ctx.clearRect(0,0,c.width,c.height);save()};let viewDate=new Date();function renderCal(){const y=viewDate.getFullYear(),m=viewDate.getMonth(),names=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];$('monthTitle').textContent=`${names[m]} ${y}`;let start=new Date(y,m,1).getDay(),lastD=new Date(y,m+1,0).getDate(),html='';for(let i=0;i<start;i++)html+='<button class="day" type="button"></button>';for(let d=1;d<=lastD;d++){let sel=d===selectedDate.getDate()&&m===selectedDate.getMonth()&&y===selectedDate.getFullYear();html+=`<button class="day ${sel?'sel':''}" type="button" data-d="${d}">${d}</button>`}$('days').innerHTML=html;document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{selectedDate=new Date(y,m,+b.dataset.d);$('workDate').textContent=fmtDate(selectedDate);$('dateModal').classList.remove('on');save()})}$('workDate').onclick=()=>{viewDate=new Date(selectedDate);renderCal();$('dateModal').classList.add('on')};$('dateClose').onclick=()=>$('dateModal').classList.remove('on');$('prevM').onclick=()=>{viewDate.setMonth(viewDate.getMonth()-1);renderCal()};$('nextM').onclick=()=>{viewDate.setMonth(viewDate.getMonth()+1);renderCal()};function renderWheels(){let hs='',ms='';for(let i=0;i<24;i++)hs+=`<button type="button" data-h="${i}" class="${i===hVal?'sel':''}">${pad(i)}</button>`;for(let i=0;i<60;i+=5)ms+=`<button type="button" data-m="${i}" class="${i===mVal?'sel':''}">${pad(i)}</button>`;$('hours').innerHTML=hs;$('mins').innerHTML=ms;document.querySelectorAll('[data-h]').forEach(b=>b.onclick=()=>{hVal=+b.dataset.h;renderWheels()});document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{mVal=+b.dataset.m;renderWheels()})}function openTime(id){activeTime=id;let t=$(id).textContent.match(/(\d{1,2}):(\d{2})/);hVal=t?+t[1]:8;mVal=t?+t[2]:0;$('timeTitle').textContent=id==='startTime'?'בחירת שעת התחלה':'בחירת שעת סיום';renderWheels();$('timeModal').classList.add('on')}$('startTime').onclick=()=>openTime('startTime');$('endTime').onclick=()=>openTime('endTime');$('timeOk').onclick=()=>{$(activeTime).textContent=fmtTime(hVal,mVal);$('timeModal').classList.remove('on');save()};fields.forEach(id=>$(id).addEventListener('input',save));function esc(s){return String(s||'-').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function buildPrint(){let sig=c.toDataURL('image/png'),now=new Date().toLocaleString('he-IL');$('printRoot').innerHTML=`<div class="p"><div class="ph"><div><div class="pt">אישור שירות / עבודה</div><div>מסמך חתום דיגיטלית</div></div><div class="plogo">SCB</div></div><div class="pbar"><span>${esc(now)}</span><span>${esc(serviceId)}</span></div><div class="pc"><div class="ps">פרטי הלקוח</div><div class="pr"><div class="pb"><div class="pl">שם לקוח</div><div class="pv">${esc(val('customerName'))}</div></div><div class="pb"><div class="pl">טלפון</div><div class="pv">${esc(val('phone'))}</div></div><div class="pb"><div class="pl">איש קשר</div><div class="pv">${esc(val('contactName'))}</div></div></div><div class="pr two"><div class="pb"><div class="pl">כתובת</div><div class="pv">${esc(val('address'))}</div></div><div class="pb"><div class="pl">אימייל</div><div class="pv">${esc(val('email'))}</div></div></div><div class="ps">פרטי העבודה</div><div class="pr"><div class="pb"><div class="pl">טכנאי</div><div class="pv">${esc(val('technician'))}</div></div><div class="pb"><div class="pl">סוג עבודה</div><div class="pv">${esc(val('workType'))}</div></div><div class="pb"><div class="pl">סטטוס</div><div class="pv">${esc(val('status'))}</div></div></div><div class="pr"><div class="pb"><div class="pl">תאריך</div><div class="pv">${esc(val('workDate'))}</div></div><div class="pb"><div class="pl">שעת התחלה</div><div class="pv">${esc(val('startTime'))}</div></div><div class="pb"><div class="pl">שעת סיום</div><div class="pv">${esc(val('endTime'))}</div></div></div><div class="ps">פרטי השירות / העבודה שבוצעה</div><div class="tx">${esc(val('workDetails'))}</div><div class="ps">הערות</div><div class="tx sm">${esc(val('notes'))}</div><div class="ps">אישור וחתימת לקוח</div><div class="pa"><div class="psig"><b>חתימת לקוח:</b><br><img src="${sig}"></div><div class="pb"><div class="pl">שם מאשר</div><div class="pv">${esc(val('approverName'))}</div></div><div class="pb"><div class="pl">תפקיד</div><div class="pv">${esc(val('approverRole'))}</div></div></div><div class="pf">נוצר ממערכת SCB SERVICE</div></div></div>`}function printPdf(){save();buildPrint();setTimeout(()=>{window.print();msg('בחלון ההדפסה בחר שמירה כ-PDF')},100)}$('pdfBtn').onclick=printPdf;$('shareBtn').onclick=()=>{printPdf();msg('לאחר השמירה שתף את ה-PDF בוואטסאפ')};$('newBtn').onclick=()=>{if(confirm('לנקות ולהתחיל טופס חדש?')){localStorage.removeItem('scb.service.draft');fields.forEach(id=>$(id).value='');ctx.clearRect(0,0,c.width,c.height);initNew();save();msg('נפתח טופס חדש')}};window.addEventListener('resize',()=>fit(c,ctx));fit(c,ctx);initNew();load();
</script>
</body>
</html>
