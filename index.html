<!doctype html>

<head>

<title>SCB SERVICE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#16406e,#07182e 50%,#031021);color:#f5f9ff}.app{max-width:980px;margin:auto;padding:18px 14px 96px}.top{position:sticky;top:8px;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:15px;border-radius:26px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);box-shadow:0 18px 45px rgba(0,0,0,.25);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#0b4c82,#1aa3ff);display:grid;place-items:center;font-weight:900;font-size:24px}.sid{direction:ltr;font-size:12px;color:#c8ecff;border:1px solid #2d76ae;background:#0b2a4e;padding:8px 10px;border-radius:999px}h1{font-size:22px;margin:0}.sub{margin-top:4px;color:#a9bdd5;font-size:13px}.card{margin-top:14px;padding:16px;border-radius:24px;background:rgba(13,36,66,.92);border:1px solid rgba(255,255,255,.1)}h2{font-size:17px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid.two{grid-template-columns:repeat(2,1fr)}label span,.lbl{display:block;color:#d8e8fb;font-size:13px;margin:0 4px 7px}.input,.select,.textarea{width:100%;border:1px solid rgba(122,181,231,.32);background:#091d36;color:#fff;border-radius:16px;padding:13px 14px;font-size:16px;outline:none;min-height:50px}.textarea{min-height:112px;resize:vertical;line-height:1.55}.pick{cursor:pointer;display:flex;align-items:center;justify-content:space-between}.pick:after{content:'›';transform:rotate(180deg);color:#78caff;font-size:24px}.sigBox{height:170px;background:#fff;border-radius:18px;border:2px dashed #70b7ee;overflow:hidden;position:relative;touch-action:none}.sigBox canvas{width:100%;height:100%;display:block}.hint{position:absolute;inset:auto 0 10px;text-align:center;color:#6b7f99;font-size:13px;pointer-events:none}.actions{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:10px;position:fixed;z-index:10;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(5,17,34,.88);border-top:1px solid rgba(255,255,255,.12)}.btn{border:0;border-radius:17px;padding:14px 16px;color:#fff;font-weight:800;font-size:15px;background:#193b63}.primary{background:linear-gradient(135deg,#1aa3ff,#0b75d1)}.good{background:linear-gradient(135deg,#13b981,#078a61)}.toast{position:fixed;top:16px;left:16px;right:16px;z-index:50;background:#0a2342;border:1px solid #2d6aa2;padding:12px 14px;border-radius:16px;display:none;text-align:center}.modal{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.55);display:none;align-items:end;justify-content:center;padding:16px}.modal.on{display:flex}#dateModal{align-items:flex-start;padding-top:68px}.sheet{width:min(520px,100%);max-height:88vh;overflow:auto;background:#f8fbff;color:#102033;border-radius:24px;padding:16px;box-shadow:0 22px 60px rgba(0,0,0,.35)}.sheetHead,.calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.iconBtn{border:0;background:#e7f3ff;border-radius:12px;padding:10px 14px;font-weight:900}.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}.week div{font-weight:800;color:#5b6d82;font-size:13px}.day{border:1px solid #d8e5f2;background:#fff;border-radius:12px;min-height:42px;font-weight:700}.day.sel{background:#1aa3ff;color:white}.wheels{direction:ltr;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:10px 4px 2px}.wheel{height:234px;overflow:auto;background:linear-gradient(180deg,#f7fbff 0%,#fff 35%,#eaf4ff 50%,#fff 65%,#f7fbff 100%);border:1px solid #d8e5f2;border-radius:22px;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}.wheel:before,.wheel:after{content:'';display:block;height:96px}.wheel button{display:block;width:100%;height:44px;border:0;background:transparent;scroll-snap-align:center;font-size:26px;font-weight:800;color:#9aa8b8}.wheel button.sel{color:#102033;background:rgba(26,163,255,.12);border-top:1px solid rgba(26,163,255,.18);border-bottom:1px solid rgba(26,163,255,.18)}.colon{font-size:34px;font-weight:900;color:#65758a;direction:ltr}.sigFull{position:fixed;inset:0;background:#061426;z-index:40;display:none}.sigFull.on{display:block}.sigStage{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px}.sigHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.sigCanvasWrap{flex:1;background:#fff;border:2px solid #71c8ff;border-radius:20px;overflow:hidden;touch-action:none}.sigCanvasWrap canvas{width:100%;height:100%;display:block}.sigBtns{display:flex;gap:8px}@media(max-width:720px){.grid,.grid.two{grid-template-columns:1fr}.logo{width:58px;height:58px}.sid{display:none}.actions{grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}#dateModal{padding-top:46px}.wheel{height:250px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app"><header class="top"><div class="brand"><div class="logo">SCB</div><div><h1>טופס ביצוע עבודה</h1><div class="sub">אפליקציית שירות לטכנאי שטח</div></div></div><div class="sid" id="sid"></div></header>
<section class="card"><h2>פרטי לקוח</h2><div class="grid"><label><span>שם לקוח</span><input id="customerName" class="input"></label><label><span>טלפון</span><input id="phone" class="input" inputmode="tel"></label><label><span>איש קשר</span><input id="contactName" class="input"></label><label><span>כתובת</span><input id="address" class="input"></label><label><span>אימייל</span><input id="email" class="input" inputmode="email"></label><label><span>טכנאי</span><input id="technician" class="input"></label></div></section>
<section class="card"><h2>פרטי עבודה</h2><div class="grid"><label><span>סוג עבודה</span><select id="workType" class="select"><option>התקנה</option><option>תיקון</option><option>בדיקה</option><option>תחזוקה</option><option>הדרכה</option><option>אחר</option></select></label><label><span>סטטוס</span><select id="status" class="select"><option>בוצע</option><option>בוצע חלקית</option><option>נדרש המשך טיפול</option><option>לא בוצע</option></select></label><label><span>תאריך</span><button id="workDate" type="button" class="input pick"></button></label><label><span>שעת התחלה</span><button id="startTime" type="button" class="input pick"></button></label><label><span>שעת סיום</span><button id="endTime" type="button" class="input pick"></button></label></div></section>
<section class="card"><h2>מה בוצע</h2><label><span>פירוט העבודה שבוצעה</span><textarea id="workDetails" class="textarea"></textarea></label><label style="margin-top:12px;display:block"><span>הערות נוספות</span><textarea id="notes" class="textarea" style="min-height:76px"></textarea></label></section>
<section class="card"><h2>אישור לקוח</h2><div class="grid two"><label><span>שם מאשר</span><input id="approverName" class="input"></label><label><span>תפקיד</span><input id="approverRole" class="input"></label></div><div style="margin-top:12px"><div class="lbl">חתימת לקוח</div><div class="sigBox" id="sigBox"><canvas id="sig"></canvas><div class="hint">לחץ/י כאן לחתימה במסך מלא</div></div></div></section></div>
<div class="actions"><button class="btn primary" id="pdfBtn">ייצא PDF</button><button class="btn good" id="shareBtn">שלח בוואטסאפ</button><button class="btn" id="newBtn">טופס חדש</button></div>
<div class="modal" id="dateModal"><div class="sheet"><div class="sheetHead"><h3>בחירת תאריך</h3><button class="btn" id="dateClose">סגור</button></div><div class="calHead"><button class="iconBtn" id="prevM">‹</button><strong id="monthTitle"></strong><button class="iconBtn" id="nextM">›</button></div><div class="week"><div>א</div><div>ב</div><div>ג</div><div>ד</div><div>ה</div><div>ו</div><div>ש</div></div><div class="days" id="days"></div></div></div>
<div class="modal" id="timeModal"><div class="sheet"><div class="sheetHead"><h3 id="timeTitle">בחירת שעה</h3><button class="btn good" id="timeOk">אישור</button></div><div class="wheels"><div class="wheel" id="hours"></div><div class="colon">:</div><div class="wheel" id="mins"></div></div></div></div>
<div class="sigFull" id="sigFull"><div class="sigStage"><div class="sigHead"><strong>חתימת לקוח</strong><div class="sigBtns"><button class="btn" id="clearSigBtn">נקה</button><button class="btn good" id="sigOkBtn">אישור</button></div></div><div class="sigCanvasWrap"><canvas id="sigWide"></canvas></div></div></div>
<script>
const $=id=>document.getElementById(id),fields=['customerName','phone','contactName','address','email','technician','workType','status','workDetails','notes','approverName','approverRole'];let serviceId='',selectedDate=new Date(),activeTime='startTime',hVal=8,mVal=0;const pad=n=>String(n).padStart(2,'0'),fmtDate=d=>`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`,fmtTime=(h,m)=>`${pad(h)}:${pad(m)}`;function makeId(){const d=new Date();return`BCS-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}-${Math.floor(1000+Math.random()*9000)}`}function msg(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2500)}function val(id){let el=$(id);return (el.value!==undefined?el.value:el.textContent).trim()||''}function initNew(){serviceId=makeId();$('sid').textContent=serviceId;selectedDate=new Date();$('workDate').textContent=fmtDate(selectedDate);let d=new Date();$('startTime').textContent=fmtTime(d.getHours(),d.getMinutes());$('endTime').textContent='בחר שעה'}let c=$('sig'),ctx=c.getContext('2d'),cw=$('sigWide'),wctx=cw.getContext('2d'),drawing=false,last=null;function fit(canvas,context){const r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1,img=canvas.width?canvas.toDataURL('image/png'):null;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));context.setTransform(d,0,0,d,0,0);context.lineWidth=3.5;context.lineCap='round';context.lineJoin='round';context.strokeStyle='#050505';if(img){let im=new Image();im.onload=()=>context.drawImage(im,0,0,r.width,r.height);im.src=img}}function p(e,canvas){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function bind(canvas,context){canvas.addEventListener('pointerdown',e=>{drawing=true;last=p(e,canvas);canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const q=p(e,canvas);context.beginPath();context.moveTo(last.x,last.y);context.lineTo(q.x,q.y);context.stroke();last=q;save()},{passive:false});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{drawing=false;last=null;save()}))}bind(c,ctx);bind(cw,wctx);function save(){const o={serviceId,date:$('workDate').textContent,start:$('startTime').textContent,end:$('endTime').textContent,sig:c.toDataURL('image/png')};fields.forEach(id=>o[id]=val(id));localStorage.setItem('scb.service.draft',JSON.stringify(o))}function load(){try{const o=JSON.parse(localStorage.getItem('scb.service.draft')||'{}');if(!o.serviceId)return;serviceId=o.serviceId;$('sid').textContent=serviceId;$('workDate').textContent=o.date||$('workDate').textContent;$('startTime').textContent=o.start||$('startTime').textContent;$('endTime').textContent=o.end||$('endTime').textContent;fields.forEach(id=>{if(o[id]!=null)$(id).value=o[id]});if(o.sig){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);im.src=o.sig}}catch(e){}}$('sigBox').onclick=()=>{document.body.style.overflow='hidden';$('sigFull').classList.add('on');setTimeout(()=>{fit(cw,wctx);wctx.clearRect(0,0,cw.width,cw.height);let im=new Image();im.onload=()=>wctx.drawImage(im,0,0,cw.getBoundingClientRect().width,cw.getBoundingClientRect().height);im.src=c.toDataURL('image/png')},80)};$('sigOkBtn').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);let im=new Image();im.onload=()=>{ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);save()};im.src=cw.toDataURL('image/png');$('sigFull').classList.remove('on');document.body.style.overflow=''};$('clearSigBtn').onclick=()=>{wctx.clearRect(0,0,cw.width,cw.height);ctx.clearRect(0,0,c.width,c.height);save()};let viewDate=new Date();function renderCal(){const y=viewDate.getFullYear(),m=viewDate.getMonth(),names=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];$('monthTitle').textContent=`${names[m]} ${y}`;let start=new Date(y,m,1).getDay(),lastD=new Date(y,m+1,0).getDate(),html='';for(let i=0;i<start;i++)html+='<button class="day" type="button"></button>';for(let d=1;d<=lastD;d++){let sel=d===selectedDate.getDate()&&m===selectedDate.getMonth()&&y===selectedDate.getFullYear();html+=`<button class="day ${sel?'sel':''}" type="button" data-d="${d}">${d}</button>`}$('days').innerHTML=html;document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{selectedDate=new Date(y,m,+b.dataset.d);$('workDate').textContent=fmtDate(selectedDate);$('dateModal').classList.remove('on');save()})}$('workDate').onclick=()=>{viewDate=new Date(selectedDate);renderCal();$('dateModal').classList.add('on')};$('dateClose').onclick=()=>$('dateModal').classList.remove('on');$('prevM').onclick=()=>{viewDate.setMonth(viewDate.getMonth()-1);renderCal()};$('nextM').onclick=()=>{viewDate.setMonth(viewDate.getMonth()+1);renderCal()};function centerWheel(){setTimeout(()=>{document.querySelector('#hours .sel')?.scrollIntoView({block:'center'});document.querySelector('#mins .sel')?.scrollIntoView({block:'center'});},30)}function renderWheels(){let hs='',ms='';for(let i=0;i<24;i++)hs+=`<button type="button" data-h="${i}" class="${i===hVal?'sel':''}">${pad(i)}</button>`;for(let i=0;i<60;i+=5)ms+=`<button type="button" data-m="${i}" class="${i===mVal?'sel':''}">${pad(i)}</button>`;$('hours').innerHTML=hs;$('mins').innerHTML=ms;document.querySelectorAll('[data-h]').forEach(b=>b.onclick=()=>{hVal=+b.dataset.h;renderWheels()});document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{mVal=+b.dataset.m;renderWheels()});centerWheel()}function openTime(id){activeTime=id;let t=$(id).textContent.match(/(\d{1,2}):(\d{2})/);hVal=t?+t[1]:8;mVal=t?+t[2]:0;$('timeTitle').textContent=id==='startTime'?'בחירת שעת התחלה':'בחירת שעת סיום';renderWheels();$('timeModal').classList.add('on');centerWheel()}$('startTime').onclick=()=>openTime('startTime');$('endTime').onclick=()=>openTime('endTime');$('timeOk').onclick=()=>{$(activeTime).textContent=fmtTime(hVal,mVal);$('timeModal').classList.remove('on');save()};fields.forEach(id=>$(id).addEventListener('input',save));function drawR(g,t,x,y,w,size,bold=false,max=2){g.font=(bold?'700 ':'')+size+'px Arial';g.fillStyle='#102033';g.textAlign='right';g.direction='rtl';let lines=[];String(t||'-').replace(/\r/g,'').split('\n').forEach(p=>{if(p.trim()===''){lines.push('');return}let words=p.split(/\s+/),line='';words.forEach(word=>{let test=line?line+' '+word:word;if(g.measureText(test).width>w&&line){lines.push(line);line=word}else line=test});lines.push(line)});lines.slice(0,max).forEach((ln,i)=>g.fillText(ln,x,y+i*size*1.25))}function box(g,x,y,w,h,l,v){g.strokeStyle='#cbd8e6';g.fillStyle='#fff';g.lineWidth=1;g.fillRect(x,y,w,h);g.strokeRect(x,y,w,h);g.fillStyle='#38516f';g.font='700 14px Arial';g.textAlign='right';g.fillText(l,x+w-9,y+18);drawR(g,v,x+w-9,y+42,w-18,19,true,2)}function sec(g,t,y){g.fillStyle='#eaf4ff';g.strokeStyle='#bad6ef';g.fillRect(19,y,756,25);g.strokeRect(19,y,756,25);g.fillStyle='#063d73';g.font='700 17px Arial';g.textAlign='right';g.fillText(t,765,y+18)}async function exportPdf(){save();if(!window.jspdf){msg('רכיב PDF עדיין נטען. נסה שוב בעוד רגע');return}msg('יוצר PDF חד בעמוד אחד...');let cv=document.createElement('canvas'),g=cv.getContext('2d');const S=2;cv.width=794*S;cv.height=1123*S;g.scale(S,S);g.imageSmoothingEnabled=true;g.imageSmoothingQuality='high';g.fillStyle='#fff';g.fillRect(0,0,794,1123);g.direction='rtl';g.fillStyle='#07182e';g.fillRect(0,0,794,106);g.fillStyle='#1aa3ff';g.fillRect(655,24,102,58);g.fillStyle='#fff';g.font='900 38px Arial';g.textAlign='center';g.fillText('SCB',706,64);g.textAlign='right';g.font='900 33px Arial';g.fillText('אישור שירות / עבודה',620,48);g.font='16px Arial';g.fillText('מסמך חתום דיגיטלית',620,74);g.fillStyle='#0b75d1';g.fillRect(0,106,794,26);g.fillStyle='#fff';g.font='14px Arial';g.direction='ltr';g.textAlign='left';g.fillText(new Date().toLocaleString('he-IL'),30,124);g.textAlign='right';g.fillText(serviceId,760,124);g.direction='rtl';let y=145;sec(g,'פרטי הלקוח',y);y+=32;box(g,19,y,247,50,'איש קשר',val('contactName'));box(g,273,y,247,50,'טלפון',val('phone'));box(g,527,y,247,50,'שם לקוח',val('customerName'));y+=57;box(g,19,y,350,50,'אימייל',val('email'));box(g,376,y,398,50,'כתובת',val('address'));y+=62;sec(g,'פרטי העבודה',y);y+=32;box(g,19,y,247,50,'סטטוס',val('status'));box(g,273,y,247,50,'סוג עבודה',val('workType'));box(g,527,y,247,50,'טכנאי',val('technician'));y+=57;box(g,19,y,247,50,'שעת סיום',val('endTime'));box(g,273,y,247,50,'שעת התחלה',val('startTime'));box(g,527,y,247,50,'תאריך',val('workDate'));y+=62;sec(g,'פרטי השירות / העבודה שבוצעה',y);y+=32;g.strokeStyle='#cbd8e6';g.strokeRect(19,y,756,150);drawR(g,val('workDetails'),760,y+28,720,18,false,7);y+=162;sec(g,'הערות',y);y+=32;g.strokeRect(19,y,756,92);drawR(g,val('notes'),760,y+28,720,17,false,4);y+=104;sec(g,'אישור וחתימת לקוח',y);y+=32;box(g,19,y,230,60,'תפקיד',val('approverRole'));box(g,257,y,230,60,'שם מאשר',val('approverName'));g.strokeStyle='#cbd8e6';g.strokeRect(495,y,280,88);g.fillStyle='#102033';g.font='700 16px Arial';g.textAlign='right';g.fillText('חתימת לקוח:',765,y+22);try{let im=new Image();im.src=c.toDataURL('image/png');await new Promise(r=>im.onload=r);g.drawImage(im,505,y+24,250,58)}catch(e){}g.fillStyle='#6b7f99';g.font='14px Arial';g.textAlign='center';g.fillText('נוצר ממערכת SCB SERVICE',397,1092);const {jsPDF}=window.jspdf,pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4',compress:true});pdf.addImage(cv.toDataURL('image/png'),'PNG',0,0,210,297);pdf.save(serviceId+'.pdf');msg('נשמר PDF חד בעמוד אחד')}$('pdfBtn').onclick=exportPdf;$('shareBtn').onclick=async()=>{await exportPdf();msg('אחרי השמירה אפשר לשתף בוואטסאפ')};$('newBtn').onclick=()=>{if(confirm('לנקות ולהתחיל טופס חדש?')){localStorage.removeItem('scb.service.draft');fields.forEach(id=>$(id).value='');ctx.clearRect(0,0,c.width,c.height);initNew();save();msg('נפתח טופס חדש')}};window.addEventListener('resize',()=>fit(c,ctx));fit(c,ctx);initNew();load();
</script>

</html>
