<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07182e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SCB Service">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SCB Service</title>
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="108" fill="%2307182e"/><circle cx="256" cy="180" r="92" fill="%231aa3ff"/><text x="256" y="350" font-size="92" text-anchor="middle" font-family="Arial" font-weight="900" fill="white">SCB</text></svg>'>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#07182e;--card:#0d2442;--field:#091d36;--line:#25527e;--text:#f3f8ff;--muted:#a9bed8;--brand:#1aa3ff;--green:#10b981}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#16406e 0,#07182e 48%,#031021 100%);color:var(--text);min-height:100vh}.app{max-width:980px;margin:auto;padding:18px 14px 92px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border-radius:26px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);box-shadow:0 18px 50px rgba(0,0,0,.25);position:sticky;top:8px;z-index:4;backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,#0b4c82,#1aa3ff);display:grid;place-items:center;font-weight:900;font-size:24px;box-shadow:0 12px 30px rgba(26,163,255,.28)}h1{font-size:22px;margin:0}p{margin:4px 0 0;color:var(--muted);font-size:13px}.badge{font-size:12px;color:#c7ecff;border:1px solid #2d76ae;background:#0b2a4e;padding:8px 10px;border-radius:999px}.card{margin-top:14px;padding:16px;border-radius:24px;background:rgba(13,36,66,.9);border:1px solid rgba(255,255,255,.1);box-shadow:0 14px 38px rgba(0,0,0,.2)}h2{font-size:17px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid.two{grid-template-columns:repeat(2,1fr)}label span{display:block;color:#d7e8fb;font-size:13px;margin:0 4px 7px}.input,.select,.textarea{width:100%;border:1px solid rgba(122,181,231,.3);background:var(--field);color:#fff;border-radius:16px;padding:13px 14px;font-size:16px;outline:none}.textarea{min-height:112px;resize:vertical;line-height:1.55}.input:focus,.select:focus,.textarea:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(26,163,255,.16)}.sigBox{height:165px;background:#f8fbff;border-radius:18px;border:2px dashed #70b7ee;overflow:hidden;position:relative;touch-action:none}.sigBox canvas{width:100%;height:100%;display:block}.hint{position:absolute;inset:auto 0 10px;text-align:center;color:#6b7f99;font-size:13px;pointer-events:none}.actions{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(5,17,34,.85);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.12);z-index:10}.btn{border:0;border-radius:17px;padding:14px 16px;color:white;font-weight:800;font-size:15px;background:#193b63;cursor:pointer}.primary{background:linear-gradient(135deg,var(--brand),#0b75d1)}.good{background:linear-gradient(135deg,var(--green),#078a61)}.small{font-size:12px;color:var(--muted);margin-top:8px}.toast{position:fixed;top:16px;left:16px;right:16px;z-index:30;background:#0a2342;border:1px solid #2d6aa2;padding:12px 14px;border-radius:16px;display:none;text-align:center}.sigFull{position:fixed;inset:0;background:#061426;z-index:40;display:none}.sigFull.on{display:block}.sigRot{position:absolute;left:50%;top:50%;width:100vh;height:100vw;transform:translate(-50%,-50%) rotate(90deg);background:#081b31;display:flex;flex-direction:column;padding:12px}.sigHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.sigWide{flex:1;background:#fff;border-radius:18px;border:2px solid #71c8ff;overflow:hidden;touch-action:none}.sigWide canvas{width:100%;height:100%;display:block}.fullBtns{display:flex;gap:8px}@media(max-width:720px){.grid,.grid.two{grid-template-columns:1fr}.top{border-radius:22px}.logo{width:58px;height:58px;font-size:20px}h1{font-size:19px}.badge{display:none}.actions{grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
<header class="top"><div class="brand"><div class="logo">SCB</div><div><h1>טופס ביצוע עבודה</h1><p>אפליקציית שירות לטכנאי שטח</p></div></div><div class="badge" id="sid"></div></header>
<section class="card"><h2>פרטי לקוח</h2><div class="grid"><label><span>שם לקוח</span><input id="customerName" class="input"></label><label><span>טלפון</span><input id="phone" class="input" inputmode="tel"></label><label><span>איש קשר</span><input id="contactName" class="input"></label><label><span>כתובת</span><input id="address" class="input"></label><label><span>אימייל</span><input id="email" class="input" inputmode="email"></label><label><span>טכנאי</span><input id="technician" class="input"></label></div></section>
<section class="card"><h2>פרטי עבודה</h2><div class="grid"><label><span>סוג עבודה</span><select id="workType" class="select"><option>התקנה</option><option>תיקון</option><option>בדיקה</option><option>תחזוקה</option><option>הדרכה</option><option>אחר</option></select></label><label><span>סטטוס</span><select id="status" class="select"><option>בוצע</option><option>בוצע חלקית</option><option>נדרש המשך טיפול</option><option>לא בוצע</option></select></label><label><span>תאריך</span><input id="workDate" class="input" readonly></label><label><span>שעת התחלה</span><input id="startTime" class="input" readonly></label><label><span>שעת סיום</span><input id="endTime" class="input" readonly></label></div></section>
<section class="card"><h2>מה בוצע</h2><label><span>פירוט העבודה שבוצעה</span><textarea id="workDetails" class="textarea" placeholder="כתוב כאן מלל חופשי..."></textarea></label><label style="margin-top:12px;display:block"><span>הערות נוספות</span><textarea id="notes" class="textarea" style="min-height:76px"></textarea></label></section>
<section class="card"><h2>אישור לקוח</h2><div class="grid two"><label><span>שם מאשר</span><input id="approverName" class="input"></label><label><span>תפקיד</span><input id="approverRole" class="input"></label></div><div style="margin-top:12px"><span style="display:block;color:#d7e8fb;font-size:13px;margin:0 4px 7px">חתימת לקוח</span><div class="sigBox" id="sigBox"><canvas id="sig"></canvas><div class="hint">לחץ/י כאן לחתימה במסך מלא</div></div><div class="small">במובייל החתימה נפתחת לרוחב גם אם סיבוב המסך נעול.</div></div></section>
</div>
<div class="actions"><button class="btn primary" id="pdfBtn">ייצא PDF</button><button class="btn good" id="shareBtn">שתף</button><button class="btn" id="newBtn">טופס חדש</button></div>
<div class="sigFull" id="sigFull"><div class="sigRot"><div class="sigHead"><strong>חתימת לקוח</strong><div class="fullBtns"><button class="btn" id="clearSigBtn">נקה</button><button class="btn good" id="sigOkBtn">אישור</button></div></div><div class="sigWide"><canvas id="sigWide"></canvas></div></div></div>
<script>
const $=id=>document.getElementById(id),fields=['customerName','phone','contactName','address','email','technician','workType','status','workDate','startTime','endTime','workDetails','notes','approverName','approverRole'];let serviceId='';const pad=n=>String(n).padStart(2,'0');function makeId(){const d=new Date();return `SCB-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}-${Math.floor(1000+Math.random()*9000)}`}function msg(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2400)}function initNew(){serviceId=makeId();$('sid').textContent=serviceId;const d=new Date();$('workDate').value=`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;$('startTime').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;$('endTime').value=''}
let c=$('sig'),ctx=c.getContext('2d'),cw=$('sigWide'),wctx=cw.getContext('2d'),draw=false,last=null;function fit(canvas,context){const r=canvas.getBoundingClientRect(),d=devicePixelRatio||1,img=canvas.toDataURL('image/png');canvas.width=Math.max(1,r.width*d);canvas.height=Math.max(1,r.height*d);context.setTransform(d,0,0,d,0,0);context.lineWidth=3;context.lineCap='round';context.strokeStyle='#111827';const im=new Image();im.onload=()=>context.drawImage(im,0,0,r.width,r.height);im.src=img}function p(e,canvas){const r=canvas.getBoundingClientRect(),q=e.touches?e.touches[0]:e;return{x:q.clientX-r.left,y:q.clientY-r.top}}function bind(canvas,context){canvas.addEventListener('pointerdown',e=>{draw=true;last=p(e,canvas);canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!draw)return;e.preventDefault();const q=p(e,canvas);context.beginPath();context.moveTo(last.x,last.y);context.lineTo(q.x,q.y);context.stroke();last=q;save()},{passive:false});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{draw=false;last=null;save()}))}bind(c,ctx);bind(cw,wctx);function save(){const o={serviceId};fields.forEach(id=>o[id]=$(id).value);o.sig=c.toDataURL('image/png');localStorage.setItem('scb.service.draft',JSON.stringify(o))}function load(){try{const o=JSON.parse(localStorage.getItem('scb.service.draft')||'{}');if(o.serviceId){serviceId=o.serviceId;$('sid').textContent=serviceId}fields.forEach(id=>{if(o[id]!=null)$(id).value=o[id]});if(o.sig){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);im.src=o.sig}}catch(e){}}
$('sigBox').onclick=()=>{fit(cw,wctx);wctx.clearRect(0,0,cw.width,cw.height);let im=new Image();im.onload=()=>wctx.drawImage(im,0,0,cw.getBoundingClientRect().width,cw.getBoundingClientRect().height);im.src=c.toDataURL('image/png');$('sigFull').classList.add('on')};$('sigOkBtn').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);let im=new Image();im.onload=()=>{ctx.drawImage(im,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);save()};im.src=cw.toDataURL('image/png');$('sigFull').classList.remove('on')};$('clearSigBtn').onclick=()=>{wctx.clearRect(0,0,cw.width,cw.height);ctx.clearRect(0,0,c.width,c.height);save()};
$('workDate').onclick=()=>{let v=prompt('הכנס תאריך DD/MM/YYYY',$('workDate').value);if(v!==null){$('workDate').value=v;save()}};['startTime','endTime'].forEach(id=>$(id).onclick=()=>{let v=prompt('הכנס שעה HH:MM',$(id).value);if(v!==null){$(id).value=v;save()}});fields.forEach(id=>$(id).addEventListener('input',save));const val=id=>($(id).value||'').trim()||'-';function lines(doc,t,w,n){return doc.splitTextToSize(t||'-',w).slice(0,n)}
async function pdf(){if(!window.jspdf){msg('ספריית PDF לא נטענה. נסה לרענן.');return}const{jsPDF}=window.jspdf,doc=new jsPDF({orientation:'p',unit:'mm',format:'a4',compress:true}),W=210,H=297,M=9;doc.setR2L(true);doc.setFillColor(247,250,255);doc.rect(0,0,W,H,'F');doc.setFillColor(7,24,46);doc.roundedRect(M,M,W-2*M,31,3,3,'F');doc.setFillColor(26,163,255);doc.roundedRect(W-M-39,M+5,31,21,3,3,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text('SCB',W-M-23.5,M+18.5,{align:'center'});doc.setFontSize(17);doc.text('טופס ביצוע עבודה',W-M-45,M+13,{align:'right'});doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(`מזהה שירות: ${serviceId}`,W-M-45,M+23,{align:'right'});doc.text(`הופק: ${new Date().toLocaleString('he-IL')}`,M+4,M+23,{align:'left'});let y=45;function sec(t){doc.setFillColor(226,241,255);doc.setDrawColor(160,196,230);doc.roundedRect(M,y,W-2*M,7,1.5,1.5,'FD');doc.setTextColor(12,39,72);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(t,W-M-4,y+5,{align:'right'});y+=10}function cell(x,w,l,v,h=15){doc.setDrawColor(205,220,235);doc.setFillColor(255,255,255);doc.roundedRect(x,y,w,h,1.5,1.5,'FD');doc.setTextColor(92,111,133);doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.text(l,x+w-3,y+4.2,{align:'right'});doc.setTextColor(20,32,51);doc.setFont('helvetica','bold');doc.setFontSize(9.2);doc.text(lines(doc,v,w-6,2),x+w-3,y+9.5,{align:'right'})}function row(a,h=15){const g=2,total=W-2*M-g*(a.length-1),cw=total/a.length;a.forEach((it,i)=>cell(M+i*(cw+g),cw,it[0],it[1],h));y+=h+3}sec('פרטי לקוח');row([['שם לקוח',val('customerName')],['טלפון',val('phone')],['איש קשר',val('contactName')]]);row([['כתובת',val('address')],['אימייל',val('email')]],14);sec('פרטי עבודה');row([['טכנאי',val('technician')],['סוג עבודה',val('workType')],['סטטוס',val('status')]]);row([['תאריך',val('workDate')],['שעת התחלה',val('startTime')],['שעת סיום',val('endTime')]],14);sec('פירוט העבודה שבוצעה');cell(M,W-2*M,'פירוט',val('workDetails'),48);doc.setFont('helvetica','normal');doc.setFontSize(8.6);doc.setTextColor(20,32,51);doc.text(lines(doc,val('workDetails'),W-2*M-8,13),W-M-4,y+10,{align:'right'});y+=51;sec('הערות נוספות');cell(M,W-2*M,'הערות',val('notes'),30);doc.setFont('helvetica','normal');doc.setFontSize(8.4);doc.setTextColor(20,32,51);doc.text(lines(doc,val('notes'),W-2*M-8,7),W-M-4,y+10,{align:'right'});y+=33;sec('אישור לקוח וחתימה');cell(M,58,'חותמת זמן',new Date().toLocaleString('he-IL'),24);cell(M+60,58,'תפקיד',val('approverRole'),24);cell(M+120,72,'שם מאשר',val('approverName'),24);doc.setDrawColor(205,220,235);doc.setFillColor(255,255,255);doc.roundedRect(M,y+27,W-2*M,35,1.5,1.5,'FD');doc.setTextColor(92,111,133);doc.setFontSize(7.5);doc.text('חתימת לקוח',W-M-4,y+32,{align:'right'});try{doc.addImage(c.toDataURL('image/png'),'PNG',M+8,y+33,72,22)}catch(e){}doc.setTextColor(110,126,145);doc.setFontSize(7.5);doc.text('מסמך זה הופק דיגיטלית ממערכת SCB Service',W/2,287,{align:'center'});doc.save(`${serviceId}.pdf`);msg(`נשמר בשם ${serviceId}.pdf`)}
$('pdfBtn').onclick=pdf;$('shareBtn').onclick=async()=>{await pdf();msg('אחרי השמירה אפשר לשתף את ה-PDF מקבצי האייפון')};$('newBtn').onclick=()=>{if(confirm('לנקות ולהתחיל טופס חדש?')){localStorage.removeItem('scb.service.draft');fields.forEach(id=>$(id).value='');ctx.clearRect(0,0,c.width,c.height);initNew();save();msg('נפתח טופס חדש')}};window.addEventListener('resize',()=>fit(c,ctx));fit(c,ctx);initNew();load();if(!serviceId)initNew();
</script>
</body>
</html>
